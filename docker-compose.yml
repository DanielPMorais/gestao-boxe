

services:
  db:
    image: postgres:15-alpine
    container_name: gestao_boxe_db
    environment:
      POSTGRES_USER: boxeadmin
      POSTGRES_PASSWORD: boxepassword
      POSTGRES_DB: gestaoboxe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestao_boxe_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://boxeadmin:boxepassword@db:5432/gestaoboxe_db
    volumes:
      - ./backend:/app
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestao_boxe_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
